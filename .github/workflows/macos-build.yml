name: tests, coverage, and macOS publish

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Required - tests and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.302
          cache: true
          cache-dependency-path: tests/EosToQLab.Tests/EosToQLab.Tests.csproj
      - name: Restore tests
        run: dotnet restore tests/EosToQLab.Tests/EosToQLab.Tests.csproj
      - name: Run tests and enforce 90% line coverage
        run: |
          dotnet test tests/EosToQLab.Tests/EosToQLab.Tests.csproj \
            --configuration Release \
            --logger "console;verbosity=normal" \
            -p:CollectCoverage=true \
            -p:CoverletOutputFormat=cobertura \
            -p:Threshold=90 \
            -p:ThresholdType=line \
            -p:ThresholdStat=total \
            '-p:Include=[EosToQLab.Core]*%2c[EosToQLab.Infrastructure]*'
      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-coverage
          path: |
            artifacts/test-results
            artifacts/coverage
            src/EosToQLab.Infrastructure/obj/Release/**/eos-show-archive-tested-archives.json
          if-no-files-found: warn

  publish:
    name: publish macOS ${{ matrix.architecture }}
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: macos-26
    strategy:
      matrix:
        architecture: [ arm64, x64 ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.302
      - name: Select Xcode 26.5 beta
        run: |
          sudo xcode-select -s /Applications/Xcode_26.5_beta_2.app/Contents/Developer
          xcodebuild -version
      - name: Install MAUI workload
        run: dotnet workload install maui --skip-manifest-update
      - name: Restore application
        run: dotnet restore src/EosToQLab.Application/EosToQLab.Application.csproj
      - name: Publish
        env:
          DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE: "true"
        run: |
          ./packaging/publish-macos.sh "${{ matrix.architecture }}"
      - uses: actions/upload-artifact@v4
        with:
          name: EosToQLab-${{ matrix.architecture }}
          path: dist/EosToQLab-${{ matrix.architecture }}.zip
