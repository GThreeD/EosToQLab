name: Feature request
description: Suggest an improvement or a new supported workflow.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Explain the user problem before proposing an implementation. Focused requests are easier to evaluate and review.

  - type: textarea
    id: problem
    attributes:
      label: Problem or limitation
      description: What workflow is difficult or impossible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should EosToQLab do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds or other designs you considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - EOS CSV import
        - EOS ESF2 or ESF3D import
        - Cue preview and editing
        - QLab connection or workspace handling
        - QLab cue creation and mapping
        - Packaging or macOS integration
        - Tests or developer tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples, compatibility constraints, or related links.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests for this request.
          required: true
        - label: This request does not contain confidential show data or credentials.
          required: true
